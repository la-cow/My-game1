<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>終極射擊遊戲版</title>
    <style>
        body { font-family: '微軟正黑體', Arial, sans-serif; text-align: center; margin-top: 50px; background-color: #f0f0f0; }
        #game-screen, #chat-screen { display: none; } 
        #login-screen { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #chat-screen { background: white; max-width: 500px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #messages { list-style-type: none; padding: 0; text-align: left; height: 350px; overflow-y: auto; border: 1px solid #ddd; border-radius: 5px; background: #fafafa; margin-bottom: 15px; }
        #messages li { padding: 10px; border-bottom: 1px solid #eee; word-break: break-all; }
        
        input[type="text"] { padding: 10px; width: 70%; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px 15px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
        
        .btn-danger { background-color: #dc3545; }
        .btn-danger:hover { background-color: #c82333; }

        #game-screen { background: white; max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #game-area { width: 100%; height: 300px; background-color: #e2f0d9; position: relative; overflow: hidden; border-radius: 8px; cursor: crosshair; margin-top: 15px; border: 2px solid #555; }
        #target { font-size: 40px; position: absolute; top: 50%; left: 50%; display: none; user-select: none; transition: transform 0.1s; }
        #target:active { transform: scale(0.8); }
        
        .control-panel { margin-top: 20px; }
        .download-link { color: #007bff; text-decoration: underline; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2>🎮 歡迎來到終極射擊遊戲</h2>
        <p>請輸入您的玩家名稱開始遊戲：</p>
        <input type="text" id="username" placeholder="請輸入名稱...">
        <button onclick="checkLogin()">進入遊戲</button>
    </div>

    <div id="game-screen">
        <h2>🎯 終極射擊練習</h2>
        <p style="font-size: 18px; font-weight: bold;">
            分數: <span id="score" style="color: red;">0</span> | 
            剩餘時間: <span id="time" style="color: blue;">30</span> 秒
        </p>
        <div id="game-area">
            <div id="target" onmousedown="hitTarget()">🎯</div>
        </div>
        
        <div class="control-panel">
            <button id="start-btn" onclick="startGame()">開始遊戲</button>
            <button class="btn-danger" onclick="leaveGame()" style="margin-left: 10px;">離開遊戲</button>
        </div>
    </div>

    <div id="chat-screen">
        <h2>🤫 頻道</h2>
        <ul id="messages"></ul>
        <div>
            <input id="chat-input" autocomplete="off" placeholder="輸入文字訊息..." />
            <button onclick="sendMessage()">發送</button>
        </div>
        <div style="margin-top: 15px; text-align: left;">
            <label>分享檔案：</label>
            <input type="file" id="file-input" onchange="sendFile()">
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let myInfo = null; // 儲存自己的序號和顏色

        // --- 登入邏輯 ---
        function checkLogin() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert("請輸入名稱");

            document.getElementById('login-screen').style.display = 'none';

            if (name === 'j3') {
                document.getElementById('chat-screen').style.display = 'block';
                // 自動觸發加入聊天室
                socket.emit('join_chat');
            } else {
                document.getElementById('game-screen').style.display = 'inline-block';
            }
        }

        // --- 聊天室邏輯 ---

        // 1. 修改送出訊息的邏輯
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const val = input.value.trim();

            if (!val) return;

            // 如果還沒加入聊天室(沒輸入過j3)，檢查是否在輸入框補打 j3
            if (!myInfo) {
                if (val === 'j3') {
                    socket.emit('join_chat');
                    input.value = '';
                } else {
                    alert('請輸入 j3 進入聊天室');
                }
                return;
            }
            
            // 已加入，發送正常訊息
            socket.emit('chat message', val);
            input.value = '';
        }

        // 2. 接收加入成功的通知
        socket.on('chat_joined', (data) => {
            myInfo = data;
            appendSystemMessage(`✅ 成功進入！你是 ${data.id} 號玩家`);
        });

        // 3. 接收並顯示彩色號碼訊息
        socket.on('chat message', (data) => {
            const item = document.createElement('li');
            item.innerHTML = `<b style="color:${data.color}">${data.id}號:</b> ${data.text}`;
            appendAndScroll(item);
        });

        // 4. 傳送檔案邏輯 (修改為傳送物件包含檔名)
        function sendFile() {
            if (!myInfo) return alert("請先輸入 j3 進入聊天室再傳送檔案");
            
            const fileInput = document.getElementById('file-input');
            const file = fileInput.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    socket.emit('file upload', {
                        name: file.name,
                        data: e.target.result
                    }); 
                };
                reader.readAsDataURL(file);
                fileInput.value = ''; 
            }
        }

        // 5. 接收檔案並製作成下載連結
        socket.on('file upload', (data) => {
            const item = document.createElement('li');
            item.innerHTML = `
                <b style="color:${data.color}">${data.id}號 分享了檔案：</b><br>
                <a href="${data.fileData}" download="${data.fileName}" class="download-link">
                   📥 點我下載 ${data.fileName}
                </a>
            `;
            appendAndScroll(item);
        });

        // 輔助函式：顯示系統訊息
        function appendSystemMessage(msg) {
            const item = document.createElement('li');
            item.style.fontStyle = 'italic';
            item.style.color = 'gray';
            item.textContent = msg;
            appendAndScroll(item);
        }

        // 輔助函式：自動捲動
        function appendAndScroll(el) {
            const msgBox = document.getElementById('messages');
            msgBox.appendChild(el);
            msgBox.scrollTop = msgBox.scrollHeight;
        }

        // --- 射擊遊戲邏輯 (保留原樣) ---
        let score = 0;
        let timeLeft = 30;
        let gameInterval;
        let targetInterval;
        let isPlaying = false;

        function startGame() {
            if (isPlaying) return; 
            isPlaying = true;
            score = 0;
            timeLeft = 30;
            document.getElementById('score').innerText = score;
            document.getElementById('time').innerText = timeLeft;
            document.getElementById('target').style.display = 'block';
            document.getElementById('start-btn').style.display = 'none';
            moveTarget(); 
            gameInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('time').innerText = timeLeft;
                if (timeLeft <= 0) endGame(); 
            }, 1000);
            targetInterval = setInterval(moveTarget, 1200);
        }

        function moveTarget() {
            const gameArea = document.getElementById('game-area');
            const target = document.getElementById('target');
            const maxX = gameArea.clientWidth - 40;
            const maxY = gameArea.clientHeight - 40;
            target.style.left = Math.floor(Math.random() * maxX) + 'px';
            target.style.top = Math.floor(Math.random() * maxY) + 'px';
        }

        function hitTarget() {
            if (!isPlaying) return;
            score++; 
            document.getElementById('score').innerText = score;
            moveTarget(); 
            clearInterval(targetInterval);
            targetInterval = setInterval(moveTarget, 1200);
        }

        function endGame() {
            isPlaying = false;
            clearInterval(gameInterval);    
            clearInterval(targetInterval);  
            document.getElementById('target').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('start-btn').innerText = '再玩一次';
            setTimeout(() => { alert('遊戲結束！你的總分是：' + score + ' 分'); }, 50);
        }

        function leaveGame() {
            if (isPlaying) { isPlaying = false; clearInterval(gameInterval); clearInterval(targetInterval); }
            document.getElementById('target').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('score').innerText = '0';
            document.getElementById('time').innerText = '30';
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'inline-block';
            document.getElementById('username').value = '';
        }
    </script>
</body>
</html>
